<!DOCTYPE html>
<html lang="en">
<head>
    <title>ARCE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect transform='rotate(45 50 50)' x='29' y='29' width='42' height='42' fill='%23ff6b00'/></svg>">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ARCE - Breaking the semiconductor reliance.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Space Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 0.5em;
            margin-bottom: 2rem;
            color: #ffffff;
        }

        .tagline {
            font-size: 1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 3rem;
        }

        .line {
            width: 60px;
            height: 1px;
            background: #333;
            margin: 0 auto 3rem;
        }

        .coming-soon {
            font-size: 0.75rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: #444;
        }

        @media (max-width: 600px) {
            .logo { font-size: 2.5rem; letter-spacing: 0.3em; }
            .tagline { font-size: 0.8rem; letter-spacing: 0.15em; }
        }
    </style>
</head>
<body>
    <canvas id="grid"></canvas>
    <div class="content">
        <div class="logo">ARCE</div>
        <div class="tagline">Breaking the semiconductor reliance</div>
        <div class="line"></div>
        <div class="coming-soon">Coming soon</div>
    </div>

    <script>
        const canvas = document.getElementById('grid');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Draw a subtle grid of dots that pulse slowly
        const dots = [];
        const spacing = 40;

        function initDots() {
            dots.length = 0;
            for (let x = spacing; x < w; x += spacing) {
                for (let y = spacing; y < h; y += spacing) {
                    dots.push({
                        x, y,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.005 + Math.random() * 0.01
                    });
                }
            }
        }
        initDots();
        window.addEventListener('resize', initDots);

        function draw(time) {
            ctx.clearRect(0, 0, w, h);
            for (const d of dots) {
                const alpha = 0.08 + 0.07 * Math.sin(d.phase + time * d.speed);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fillRect(d.x, d.y, 1, 1);
            }
            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    </script>
</body>
</html>
